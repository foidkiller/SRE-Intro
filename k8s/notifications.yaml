apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      containers:
      - name: notifications
        image: quickticket-notifications:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8083
        env:
        - name: NOTIFY_FAILURE_RATE
          value: "0.0"
        - name: NOTIFY_LATENCY_MS
          value: "0"
---
apiVersion: v1
kind: Service
metadata:
  name: notifications
spec:
  selector:
    app: notifications
  ports:
  - port: 8083
    targetPort: 8083
