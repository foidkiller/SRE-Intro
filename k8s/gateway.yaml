apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gateway
spec:
  replicas: 5
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause: {duration: 30s}
        - analysis:
            templates:
            - templateName: gateway-error-rate
            args:
            - name: canary-hash
              valueFrom:
                podTemplateHashValue: Latest
        - setWeight: 60
        - pause: {duration: 30s}
        - setWeight: 100
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: quickticket-gateway:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: EVENTS_URL
          value: "http://events:8081"
        - name: PAYMENTS_URL
          value: "http://payments:8082"
        - name: APP_VERSION
          value: "v4-auto-analysis"
