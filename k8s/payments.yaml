apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
      - name: payments
        image: quickticket-payments:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8082
        env:
        - name: PAYMENT_FAILURE_RATE
          value: "0.0"
        - name: PAYMENT_LATENCY_MS
          value: "0"
