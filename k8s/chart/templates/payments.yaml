apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
spec:
  replicas: {{ .Values.payments.replicas }}
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
      - name: payments
        image: {{ .Values.payments.image }}
        imagePullPolicy: Never
        ports:
        - containerPort: 8082
        env:
        - name: PAYMENT_FAILURE_RATE
          value: "0.0"
        - name: PAYMENT_LATENCY_MS
          value: "0"
---
apiVersion: v1
kind: Service
metadata:
  name: payments
spec:
  selector:
    app: payments
  ports:
  - port: 8082
    targetPort: 8082
